<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HelpDesk Pro - Gestión de Tickets</title>
    <style>
        :root {
            --primary: #2563eb;
            --success: #16a34a;
            --danger: #dc2626;
            --bg: #f8fafc;
            --text: #1e293b;
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 40px 20px; }
        .card { width: 100%; max-width: 900px; background: white; padding: 32px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        h1 { margin-top: 0; font-size: 1.8rem; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        
        /* Formulario mejorado */
        .form-container { display: grid; grid-template-columns: 1fr 1fr auto; gap: 12px; margin-bottom: 24px; background: #f1f5f9; padding: 16px; border-radius: 8px; }
        input { padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; outline: none; transition: border 0.2s; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
        
        button { padding: 12px 24px; background: var(--primary); color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; display: flex; align-items: center; gap: 8px; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        button:hover:not(:disabled) { opacity: 0.9; }

        /* Estados: Cargando, Éxito, Error */
        #status-bar { display: none; padding: 12px; margin-bottom: 20px; border-radius: 6px; font-size: 14px; font-weight: 500; animation: fadeIn 0.3s; }
        .loading { background: #e0f2fe; color: #0369a1; border: 1px solid #bae6fd; display: block !important; }
        .error { background: #fee2e2; color: #b91c1c; border: 1px solid #fecaca; display: block !important; }
        .success { background: #dcfce7; color: #15803d; border: 1px solid #bbf7d0; display: block !important; }

        /* Tabla Estilizada */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; padding: 12px; background: #f8fafc; border-bottom: 2px solid #e2e8f0; font-size: 13px; text-transform: uppercase; letter-spacing: 0.05em; }
        td { padding: 16px 12px; border-bottom: 1px solid #f1f5f9; font-size: 15px; }
        tr:hover { background-color: #f8fafc; }
        .badge { padding: 4px 8px; border-radius: 99px; font-size: 12px; font-weight: 600; background: #fef3c7; color: #92400e; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="card">
    <h1>🎟️ Panel de Soporte Técnico</h1>

    <div id="status-bar"></div>

    <div class="form-container">
        <input type="text" id="titulo" placeholder="Título del problema...">
        <input type="text" id="descripcion" placeholder="Detalles del ticket...">
        <button id="btn-crear" onclick="enviarTicket()">
            <span id="btn-text">Crear Ticket</span>
        </button>
    </div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Asunto</th>
                <th>Descripción</th>
                <th>Estado</th>
            </tr>
        </thead>
        <tbody id="tabla-tickets"></tbody>
    </table>
</div>

<script>
    const statusBar = document.getElementById('status-bar');
    const btnCrear = document.getElementById('btn-crear');

    function mostrarEstado(mensaje, tipo) {
        statusBar.textContent = mensaje;
        statusBar.className = tipo; // loading, success o error
        if (tipo === 'success') {
            setTimeout(() => statusBar.style.display = 'none', 3000);
        }
    }

    async function cargarTickets() {
        try {
            const res = await fetch('/tickets');
            const tickets = await res.json();
            const tabla = document.getElementById('tabla-tickets');
            tabla.innerHTML = '';
            tickets.reverse().forEach(t => {
                tabla.innerHTML += `
                    <tr>
                        <td>#${t.id}</td>
                        <td style="font-weight: 500;">${t.titulo}</td>
                        <td style="color: #64748b;">${t.descripcion}</td>
                        <td><span class="badge">${t.estado}</span></td>
                    </tr>`;
            });
        } catch (e) {
            mostrarEstado("Error al conectar con el servidor", "error");
        }
    }

    async function enviarTicket() {
        const titulo = document.getElementById('titulo').value;
        const descripcion = document.getElementById('descripcion').value;

        // Validacion simple en frontend antes de enviar (Mejora UX)
        if (!titulo || !descripcion) {
            mostrarEstado("Por favor, rellena ambos campos", "error");
            return;
        }

        // Estado: Cargando
        btnCrear.disabled = true;
        mostrarEstado("⏳ Procesando ticket...", "loading");

        try {
            const response = await fetch('/tickets', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ titulo, descripcion })
            });

            const data = await response.json();

            if (!response.ok) {
                let msg = data.titulo || data.descripcion || "Error en los datos";
                throw new Error(msg);
            }

            // Estado: Éxito
            mostrarEstado("✅ Ticket creado correctamente", "success");
            document.getElementById('titulo').value = '';
            document.getElementById('descripcion').value = '';
            cargarTickets();

        } catch (error) {
            // Estado: Error
            mostrarEstado("❌ " + error.message, "error");
        } finally {
            btnCrear.disabled = false;
        }
    }

    cargarTickets();
</script>
</body>
</html>
