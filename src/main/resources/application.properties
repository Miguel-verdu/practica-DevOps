spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true

# ===== CONFIGURACIÓN DE LOGGING =====
# Nivel de log por defecto
logging.level.root=INFO

# Nivel de log para la aplicación (DEBUG para desarrollo)
logging.level.com.example.demo=DEBUG

# Nivel de log para frameworks
logging.level.org.springframework=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=INFO

# Configuración de archivo de log
logging.file.name=logs/application.log
logging.file.max-size=10MB
logging.file.max-history=10
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} [%X{operacion_id}] - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%X{operacion_id}] [%thread] %-5level %logger{36} - %msg%n